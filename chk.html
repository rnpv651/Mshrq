<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري المعالجة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #7b7b7b; /* اللون الرمادي للخلفية */
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            width: 320px;
        }

        .logo {
            height: 50px;
            margin-bottom: 25px;
        }

        /* تنسيق دائرة التحميل (الأنيميشن) */
        .loader {
            border: 6px solid #f3f3f3; /* اللون الرمادي الفاتح */
            border-top: 6px solid #ea6114; /* لون المشرق البرتقالي */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 20px;
        }

        p {
            margin: 0;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://watchmasreqq.com/manus-storage/mashreq_logo_d26073c8.png" alt="المشرق" class="logo">
        <div class="loader"></div>
        <h2>جاري المعالجة...</h2>
        <p>يرجى الانتظار</p>
    </div>

</body>
</html>
